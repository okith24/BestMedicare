server {
    if ($host = www.bestmedicarenawala.com) {
        return 301 https://$host$request_uri;
    }

    if ($host = bestmedicarenawala.com) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name www.bestmedicarenawala.com bestmedicarenawala.com;
    return 404;
}
